<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title><h2>MCQ Quiz Application</h2></title>

<link rel="stylesheet" href="/mcqlogin.css">

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>

<div class="title">
    MCQ Quiz Application
</div>

<div class="container">

    <h2>Login</h2>

    <form action="/mcqlogin" method="post">

        <label>Select Role</label>
        <select name="role" required>
            <option value="">Choose Role</option>
            <option value="USER">User</option>
            <option value="ADMIN">Admin</option>
        </select>

        <label>Username</label>
        <input type="text"
               name="username"
               placeholder="Enter Username"
               required>

        <label>Password</label>

		<div class="password-box">
		    <input type="password"
		           id="password"
		           name="password"
		           placeholder="Enter Password">

				   <i id="eye"
				      class="fa-solid fa-eye-slash eye-icon"
				      onclick="togglePassword()"></i>
		</div>

		
        <button type="submit">Login</button>

        <p>
            Don't have an account?
            <a href="/mcqregister">Register</a>
        </p>

    </form>

</div>

<script src="/mcqlogin.js"></script>

</body>
</html>
